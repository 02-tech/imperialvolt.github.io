<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="description"
        content="Imperial Volt – soluções digitais completas: sites, apps, automações, patentes e mais." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0c0c" />

  <!-- Open Graph / Twitter -->
  <meta property="og:title" content="Imperial Volt – Soluções Digitais" />
  <meta property="og:description" content="Sites, apps, automações e patentes para sua empresa." />
  <meta property="og:image" content="https://imperialvolt.com/preview.webp" />
  <meta name="twitter:card" content="summary_large_image" />

  <title data-i18n="page.title">Imperial Volt</title>

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- Critical CSS inline p/ FCP -->
  <style>
    html,body{margin:0;padding:0;font-family:'Inter',sans-serif;background:#0c0c0c;color:#fff}
    .hero{display:flex;justify-content:space-between;align-items:center;gap:1.5rem;padding:1.5rem 0 2rem}
    .skip-link{position:absolute;left:-999px}
    @media(max-width:400px){.hero{gap:.5rem;padding:1rem .5rem}}

    /* vídeo de fundo */
    .bg-video{
      position:fixed;top:0;left:0;width:100%;height:100%;
      object-fit:cover;z-index:0;pointer-events:none;
    }

    /* conteúdo acima do vídeo */
    .hero,main,footer,#chatbot-toggle,#chatbot-window{
      position:relative;z-index:1;
    }

    /* painel de configurações: overlay fixo com rolagem */
    #configFrame{
      position:fixed;top:0;left:0;width:100vw;height:90vh;
      max-height:100vh;overflow:auto;
      border:none;background:#fff;
      z-index:1000;
      display:none;               /* visível só com .open */
    }
    #configFrame.open{display:block}
  </style>

  <!-- CSS assíncrono -->
  <link rel="preload" href="styles.css" as="style" onload="this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="styles.css"></noscript>

  <!-- Manifesto e pré-carregamento dos JSON de idioma -->
  <link rel="manifest" href="manifest.json">
  <link rel="prefetch" href="locales/pt-BR.json" as="fetch" crossorigin>
  <link rel="prefetch" href="locales/en-US.json" as="fetch" crossorigin>
</head>
<body>

  <!-- Vídeo de fundo -->
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="fundo_desktop.mp4" type="video/mp4">
    Seu navegador não suporta vídeo de fundo.
  </video>

  <a class="skip-link" href="#conteudo" data-i18n="skip.link">Ir para o conteúdo</a>

  <!-- seletor de idioma oculto (mantém i18n funcional) -->
  <div class="lang-switcher" aria-hidden="true">
    <label class="sr-only" for="lang-select">Idioma</label>
    <select id="lang-select" tabindex="-1">
      <option value="pt-BR">PT</option>
      <option value="en-US">EN</option>
    </select>
  </div>

  <!-- PAINEL DE CONFIGURAÇÕES (overlay) -->
  <iframe id="configFrame" src="config.html" title="Configurações do site"
          scrolling="yes" tabindex="-1" aria-hidden="true"></iframe>

  <!-- HERO ---------------------------------------------------------------- -->
  <header class="hero" role="banner">
    <div class="hero-left">
      <img src="Guilherme.webp" alt="Guilherme – Gestor" class="guilherme-img" loading="lazy">
      <p class="caption">Guilherme – Gestor</p>
    </div>

    <div class="hero-cta">
      <button id="cta-btn" data-i18n="hero.cta"
              aria-controls="conteudo" aria-expanded="false">
        ⚡ Energize seus projetos
      </button>
    </div>

    <div class="hero-right">
      <img src="Voltz.webp"  alt="Mascote Voltz" class="volt-img" loading="lazy">
      <img src="nome.webp"   alt="Logo Imperial Volt" class="logo-name" loading="lazy">
    </div>
  </header>

  <!-- MAIN ---------------------------------------------------------------- -->
  <!-- (todo o restante permanece idêntico, nenhum elemento foi alterado) -->
  <!-- ... -->

  <!-- Service Worker e scripts -->
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(console.error);}</script>
  <script src="https://unpkg.com/i18next@21.6.3/i18next.min.js" defer></script>
  <script type="module" src="main.js" defer></script>
  <script src="chatbot.js" defer></script>
</body>
</html>
