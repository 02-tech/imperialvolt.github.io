<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Suporte Adicional</title>

<style>
:root{--neon:#00f0ff;--txt:silver;--bg:#1e1e1e;}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Arial,Helvetica,sans-serif;
  margin:0;padding:30px 15px;
  text-align:center;
  color:var(--txt);
  background:rgba(17,17,17,.85);
  backdrop-filter:blur(5px);
  border-top:2px solid var(--neon);
}

/* ---------- layout ---------- */
.suporte-box{max-width:620px;margin:0 auto}
h2{color:var(--neon);margin-bottom:22px}

/* ---------- botões Sim / Não ---------- */
.btn{
  background:var(--neon);
  color:#111;
  font-weight:bold;
  padding:10px 24px;
  border:none;border-radius:6px;
  cursor:pointer;
  transition:.3s;
  margin:0 10px;
}
.btn:hover{background:#0ff;transform:scale(1.05)}

/* ---------- slides ---------- */
.slide{
  overflow:hidden;
  max-height:0;             /* recolhido */
  opacity:0;
  transform:translateY(-12px);
  transition:max-height .6s ease,
             opacity    .6s ease,
             transform  .6s ease,
             padding    .6s ease;
  margin-top:22px;
  background:var(--bg);
  padding:0 18px;
  border:1px solid var(--neon);
  border-radius:8px;
}
.slide.open{
  max-height:none;          /* cresce quanto precisar */
  opacity:1;
  transform:translateY(0);
  padding:22px 18px;
}

/* ---------- iframe ---------- */
iframe{
  width:100%;
  height:600px;
  border:none;
  border-radius:8px;
  display:none;
  margin-top:20px;
}

/* links genéricos */
a{color:var(--neon);text-decoration:none}
a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="suporte-box">
  <h2>🤔 Ainda com dúvidas?</h2>
  <button class="btn" id="btn-sim">Sim</button>
  <button class="btn" id="btn-nao">Não</button>

  <!-- SIM -------------------------------------------------------->
  <div id="box-sim" class="slide">
    <iframe id="conteudo-frame" title="Conteúdo motivacional"></iframe>
  </div>

  <!-- NÃO -------------------------------------------------------->
  <div id="box-nao" class="slide">
    <p style="font-size:1.1rem">
      “Se não há dúvida, há dívidas.”<br>
      Invista na sua ideia — <b>comece hoje com a Imperial Volt!</b>
    </p>
    <p>
      <a class="btn" href="https://wa.me/5524992144995" target="_blank">💥 Desafio Aceito!</a>
    </p>
  </div>
</div>

<script>
const btnSim = document.getElementById('btn-sim');
const btnNao = document.getElementById('btn-nao');
const boxSim = document.getElementById('box-sim');
const boxNao = document.getElementById('box-nao');
const iframe = document.getElementById('conteudo-frame');

/* ---------- abre / fecha ---------- */
function abrir(bx){
  [boxSim, boxNao].forEach(b => b.classList.remove('open'));
  bx.classList.add('open');
  setTimeout(reportAltura, 650);
  parent.postMessage({type:'suporte-scroll-self'}, '*');
}

btnSim.onclick = () => {
  abrir(boxSim);
  iframe.src = 'conteudo.html';
  iframe.style.display = 'block';
};
btnNao.onclick = () => abrir(boxNao);

/* ---------- comunicação com a página-pai ---------- */
function reportAltura(){
  parent.postMessage({
    type: 'suporte-frame-height',
    height: document.documentElement.scrollHeight
  }, '*');
}

addEventListener('load',   reportAltura);
addEventListener('resize', () => setTimeout(reportAltura,60));

/* fecha tudo quando o pai pedir */
window.addEventListener('message', ({data})=>{
  if(data?.type==='suporte-close'){
    [boxSim,boxNao].forEach(b=>b.classList.remove('open'));
    iframe.style.display='none';
    iframe.src='';
    reportAltura();
  }
});
</script>
</body>
</html>
