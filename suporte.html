<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Suporte Adicional</title>

<style>
:root{
  --neon:#00f0ff;
  --txt:silver;
  --bg:#1e1e1e;
}

/* ---------- reset / base ---------- */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Arial,Helvetica,sans-serif;
  background:rgba(17,17,17,.85);
  backdrop-filter:blur(5px);
  color:var(--txt);
  padding:30px 15px;
  text-align:center;
  border-top:2px solid var(--neon);
}

/* ---------- container ---------- */
.suporte-box{max-width:620px;margin:0 auto}
h2{color:var(--neon);margin-bottom:22px}

/* ---------- botões SIM / NÃO ---------- */
.btn{
  background:var(--neon);
  color:#111;
  font-weight:bold;
  padding:10px 24px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition:.3s;
  margin:0 10px;
}
.btn:hover{background:#0ff;transform:scale(1.05)}

/* ---------- slides ---------- */
.slide{
  max-height:0;                 /* recolhido */
  opacity:0;
  transform:translateY(-12px);
  transition:max-height .6s ease,
             opacity    .6s ease,
             transform  .6s ease,
             padding    .6s ease;
  margin-top:22px;
  background:var(--bg);
  padding:0 18px;
  border:1px solid var(--neon);
  border-radius:8px;
}
.slide.open{
  max-height:none;              /* deixa crescer naturalmente */
  opacity:1;
  transform:translateY(0);
  padding:22px 18px 28px;
}

/* garante que o botão interno nunca “corte” o texto */
.slide .btn{
  display:inline-block;
  max-width:100%;
  white-space:nowrap;
  margin-top:18px;
}

/* ---------- iframe ---------- */
iframe{
  width:100%;
  height:600px;
  border:none;
  border-radius:8px;
  display:none;
  margin-top:20px;
}

a{color:var(--neon);text-decoration:none}
a:hover{text-decoration:underline}
</style>
</head>
<body>

<div class="suporte-box">
  <h2>🤔 Ainda com dúvidas?</h2>
  <button class="btn" id="btn-sim">Sim</button>
  <button class="btn" id="btn-nao">Não</button>

  <!-- SIM ------------------------------------------------------------>
  <div id="box-sim" class="slide">
    <iframe id="conteudo-frame" title="Conteúdo motivacional"></iframe>
  </div>

  <!-- NÃO ------------------------------------------------------------>
  <div id="box-nao" class="slide">
    <p style="font-size:1.05rem">
      “Se não há dúvida, há dívidas.”<br>
      Invista na sua ideia — <b>comece hoje com a Imperial Volt!</b>
    </p>
    <a class="btn" href="https://wa.me/5524992144995" target="_blank">
      💥 Desafio Aceito!
    </a>
  </div>
</div>

<script>
/* --- elementos --- */
const btnSim = document.getElementById('btn-sim');
const btnNao = document.getElementById('btn-nao');
const boxSim = document.getElementById('box-sim');
const boxNao = document.getElementById('box-nao');
const iframe = document.getElementById('conteudo-frame');

/* --- abre / fecha slides --- */
function abrir(alvo){
  [boxSim, boxNao].forEach(b => b.classList.remove('open'));
  alvo.classList.add('open');
  setTimeout(reportAltura, 650);                // espera animação terminar
  parent.postMessage({type:'suporte-scroll-self'}, '*');
}

btnSim.onclick = () => {
  abrir(boxSim);
  iframe.src = 'conteudo.html';
  iframe.style.display = 'block';
};
btnNao.onclick = () => abrir(boxNao);

/* --- comunicação com página-pai --- */
function reportAltura(){
  parent.postMessage({
    type:'suporte-frame-height',
    height:document.documentElement.scrollHeight
  }, '*');
}
addEventListener('load',   reportAltura);
addEventListener('resize', () => setTimeout(reportAltura,60));

/* --- pai pode mandar fechar tudo --- */
window.addEventListener('message', ({data})=>{
  if(data?.type === 'suporte-close'){
    [boxSim, boxNao].forEach(b => b.classList.remove('open'));
    iframe.style.display = 'none';
    iframe.src = '';           // libera memória
    reportAltura();
  }
});
</script>
</body>
</html>
